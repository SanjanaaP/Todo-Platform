<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks — To-Do-Platform</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">

      <div class="page-header">
        <h1 class="page-title">
          Task <span>Management</span>
        </h1>

        <button class="btn btn-primary" onclick="openTaskModal()">
          + New Task
        </button>
      </div>

      <div class="filters-bar">

        <input
          type="text"
          id="search"
          placeholder="Search tasks..."
          oninput="loadTasks()"
        />

        <select id="filter-status" onchange="loadTasks()">
          <option value="">All Statuses</option>
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>

        <select id="filter-priority" onchange="loadTasks()">
          <option value="">All Priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>

        <select id="sort-by" onchange="loadTasks()">
          <option value="created_at">Sort: Newest</option>
          <option value="due_date">Sort: Due Date</option>
          <option value="priority">Sort: Priority</option>
        </select>

        <select id="sort-order" onchange="loadTasks()">
          <option value="desc">Descending</option>
          <option value="asc">Ascending</option>
        </select>

      </div>

      <div class="card" style="padding:0; overflow:hidden;">

        <table class="task-table">

          <thead>
            <tr>
              <th>Task</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Due Date</th>
              <th>Assigned</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="task-tbody">
            <tr>
              <td colspan="6" style="text-align:center;padding:40px;">
                Loading tasks...
              </td>
            </tr>
          </tbody>

        </table>

      </div>

    </main>
  </div>

  <!-- TASK MODAL -->

  <div class="modal-overlay" id="task-modal">

    <div class="modal">

      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Create Task</h2>

        <button class="modal-close" onclick="closeTaskModal()">
          X
        </button>
      </div>

      <input type="hidden" id="task-id" />

      <div class="form-group">
        <label>Task Title</label>
        <input type="text" id="task-title" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="task-desc"></textarea>
      </div>

      <div class="form-row">

        <div class="form-group">
          <label>Status</label>

          <select id="task-status">
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>

        <div class="form-group">
          <label>Priority</label>

          <select id="task-priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

      </div>

      <div class="form-row">

        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="task-due" />
        </div>

        <div class="form-group">
          <label>Assign To</label>

          <select id="task-assign">
            <option value="">Unassigned</option>
          </select>
        </div>

      </div>

      <div class="modal-actions">

        <button class="btn btn-ghost" onclick="closeTaskModal()">
          Cancel
        </button>

        <button
          class="btn btn-primary"
          id="save-task-btn"
          onclick="saveTask()"
        >
          Create Task
        </button>

      </div>

    </div>
  </div>

  <!-- DELETE MODAL -->

  <div class="modal-overlay" id="delete-modal">

    <div class="modal" style="max-width:400px;">

      <div class="modal-header">
        <h2 class="modal-title">Delete Task</h2>

        <button
          class="modal-close"
          onclick="document.getElementById('delete-modal').classList.remove('open')"
        >
          X
        </button>
      </div>

      <p style="font-size:0.9rem;">
        Are you sure you want to delete this task?
      </p>

      <div class="modal-actions">

        <button
          class="btn btn-ghost"
          onclick="document.getElementById('delete-modal').classList.remove('open')"
        >
          Cancel
        </button>

        <button class="btn btn-danger" id="confirm-delete-btn">
          Delete
        </button>

      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/app.js"></script>

  <script>

    requireAuth();
    renderSidebar('tasks');

    var API = 'http://localhost:5000/api';

    function getHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getToken()
      };
    }

    async function loadTasks() {

      var search = document.getElementById('search').value;
      var status = document.getElementById('filter-status').value;
      var priority = document.getElementById('filter-priority').value;
      var sortBy = document.getElementById('sort-by').value;
      var order = document.getElementById('sort-order').value;

      var url = API + '/tasks?';

      if (search) { url += 'search=' + search + '&'; }
      if (status) { url += 'status=' + status + '&'; }
      if (priority) { url += 'priority=' + priority + '&'; }
      if (sortBy) { url += 'sort_by=' + sortBy + '&'; }
      if (order) { url += 'order=' + order + '&'; }

      var tbody = document.getElementById('task-tbody');

      tbody.innerHTML =
        '<tr><td colspan="6" style="text-align:center;padding:20px;">Loading...</td></tr>';

      try {

        var res = await fetch(url, {
          method: 'GET',
          headers: getHeaders()
        });

        var data = await res.json();

        if (!data.tasks || data.tasks.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="6" style="text-align:center;padding:40px;">No tasks found</td></tr>';
          return;
        }

        var html = '';

        data.tasks.forEach(function(t) {

          var isOverdue =
            t.due_date &&
            new Date(t.due_date) < new Date() &&
            t.status !== 'completed';

          var dueDate =
            t.due_date
              ? new Date(t.due_date).toLocaleDateString()
              : '-';

          html += '<tr>';
          html += '<td class="task-title-cell">' + t.title + '</td>';
          html += '<td><span class="badge badge-' + t.priority + '">' + t.priority + '</span></td>';
          html += '<td><span class="badge badge-' + t.status + '">' + t.status.replace('_', ' ') + '</span></td>';
          html += '<td>' + dueDate + (isOverdue ? ' ⚠ Overdue' : '') + '</td>';
          html += '<td>' + (t.assignee_name || '-') + '</td>';
          html += '<td>';
          html += '<button class="btn btn-ghost btn-sm" onclick="editTask(' + t.id + ')">Edit</button>';
          html += '<button class="btn btn-danger btn-sm" onclick="confirmDelete(' + t.id + ')">Delete</button>';
          html += '</td>';
          html += '</tr>';

        });

        tbody.innerHTML = html;
        window.tasksData = data.tasks;

      } catch (err) {
        console.log(err);
        tbody.innerHTML =
          '<tr><td colspan="6" style="text-align:center;padding:40px;color:red;">Error loading tasks</td></tr>';
      }
    }

    function openTaskModal(task) {

      task = task || null;

      document.getElementById('task-id').value = task ? task.id : '';
      document.getElementById('task-title').value = task ? task.title : '';
      document.getElementById('task-desc').value = task ? (task.description || '') : '';
      document.getElementById('task-status').value = task ? task.status : 'todo';
      document.getElementById('task-priority').value = task ? task.priority : 'medium';
      document.getElementById('task-due').value = task && task.due_date ? task.due_date.split('T')[0] : '';
      document.getElementById('modal-title').textContent = task ? 'Edit Task' : 'Create Task';
      document.getElementById('save-task-btn').textContent = task ? 'Update Task' : 'Create Task';
      document.getElementById('task-modal').classList.add('open');
    }

    function closeTaskModal() {
      document.getElementById('task-modal').classList.remove('open');
    }

    function editTask(id) {
      var task = window.tasksData.find(function(t) { return t.id === id; });
      if (task) { openTaskModal(task); }
    }

    function confirmDelete(id) {
      document.getElementById('delete-modal').classList.add('open');
      document.getElementById('confirm-delete-btn').onclick = function() {
        deleteTask(id);
      };
    }

    async function deleteTask(id) {
      try {
        var res = await fetch(API + '/tasks/' + id, {
          method: 'DELETE',
          headers: getHeaders()
        });
        var data = await res.json();
        if (data.success) {
          document.getElementById('delete-modal').classList.remove('open');
          loadTasks();
          showToast('Task deleted!', 'success');
        } else {
          showToast(data.message || 'Error deleting task', 'error');
        }
      } catch (err) {
        console.log(err);
        showToast('Error deleting task', 'error');
      }
    }

    async function saveTask() {

      var id = document.getElementById('task-id').value;
      var title = document.getElementById('task-title').value;
      var desc = document.getElementById('task-desc').value;
      var status = document.getElementById('task-status').value;
      var priority = document.getElementById('task-priority').value;
      var due = document.getElementById('task-due').value;
      var assign = document.getElementById('task-assign').value;

      if (!title) {
        showToast('Please enter a task title', 'error');
        return;
      }

      var body = {
        title: title,
        description: desc,
        status: status,
        priority: priority,
        due_date: due || null,
        assignee_id: assign || null
      };

      var method = id ? 'PUT' : 'POST';
      var url = id ? API + '/tasks/' + id : API + '/tasks';

      try {
        var res = await fetch(url, {
          method: method,
          headers: getHeaders(),
          body: JSON.stringify(body)
        });

        var data = await res.json();

        if (data.success) {
          closeTaskModal();
          loadTasks();
          showToast(id ? 'Task updated!' : 'Task created!', 'success');
        } else {
          showToast(data.message || 'Something went wrong', 'error');
        }

      } catch (err) {
        console.log(err);
        showToast('Error saving task', 'error');
      }
    }

    loadTasks();

  </script>

</body>
</html>
