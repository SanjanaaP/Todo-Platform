<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — To-Do-Platform</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">User <span>Management</span></h1>
        <span class="badge badge-high" style="font-size:0.78rem;padding:6px 12px;">Admin Only</span>
      </div>

      <div class="card" style="padding:0;overflow:hidden;">
        <table class="task-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Role</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="role-modal">
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <h2 class="modal-title">Change Role</h2>
        <button class="modal-close" onclick="document.getElementById('role-modal').classList.remove('open')">X</button>
      </div>
      <input type="hidden" id="role-user-id" />
      <div class="form-group">
        <label>New Role</label>
        <select id="new-role">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="document.getElementById('role-modal').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" onclick="saveRole()">Update Role</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="../js/app.js"></script>
  <script>
    requireAuth();
    const me = getUser();
    if (me.role !== 'admin') window.location.href = 'dashboard.html';
    renderSidebar('users');
    loadUsers();

    async function loadUsers() {
      const res = await authFetch('/users');
      const tbody = document.getElementById('users-tbody');
      if (!res.ok) {
        tbody.innerHTML = '<tr><td colspan="5">Failed to load users</td></tr>';
        return;
      }

      tbody.innerHTML = res.data.users.map(u => `
        <tr>
          <td>
            <div class="flex gap-8" style="align-items:center;">
              <div class="avatar" style="width:32px;height:32px;font-size:0.75rem;">${u.name.charAt(0).toUpperCase()}</div>
              <strong>${u.name}</strong>
            </div>
          </td>
          <td style="color:var(--text-muted);font-size:0.85rem;font-family:var(--font-mono)">${u.email}</td>
          <td><span class="badge ${u.role === 'admin' ? 'badge-high' : 'badge-low'}">${u.role}</span></td>
          <td style="font-size:0.8rem;color:var(--text-muted)">${new Date(u.created_at).toLocaleDateString()}</td>
          <td>
            <div class="flex gap-8">
              ${u.id !== me.id ? `
                <button class="btn btn-ghost btn-sm" onclick="openRoleModal(${u.id}, '${u.role}')">Change Role</button>
                <button class="btn btn-danger btn-sm" onclick="deleteUserConfirm(${u.id})">Delete</button>
              ` : '<span class="text-muted" style="font-size:0.8rem;">You</span>'}
            </div>
          </td>
        </tr>`).join('');
    }

    function openRoleModal(id, currentRole) {
      document.getElementById('role-user-id').value = id;
      document.getElementById('new-role').value = currentRole;
      document.getElementById('role-modal').classList.add('open');
    }

    async function saveRole() {
      const id = document.getElementById('role-user-id').value;
      const role = document.getElementById('new-role').value;
      const res = await authFetch(`/users/${id}/role`, 'PUT', { role });
      document.getElementById('role-modal').classList.remove('open');
      if (res.ok) { showToast('Role updated', 'success'); loadUsers(); }
      else showToast(res.data.message || 'Failed', 'error');
    }

    async function deleteUserConfirm(id) {
      if (!confirm('Delete this user? This cannot be undone.')) return;
      const res = await authFetch(`/users/${id}`, 'DELETE');
      if (res.ok) { showToast('User deleted', 'success'); loadUsers(); }
      else showToast(res.data.message || 'Failed', 'error');
    }
  </script>
</body>
</html>
