<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — To-Do-Platform</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Dashboard <span>Overview</span></h1>
        <a href="tasks.html" class="btn btn-primary">+ New Task</a>
      </div>

      <div class="stats-grid">
        <div class="stat-card total">
          <div class="stat-icon"></div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card completed">
          <div class="stat-icon"></div>
          <div class="stat-value" id="stat-completed">—</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-icon"></div>
          <div class="stat-value" id="stat-pending">—</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card overdue">
          <div class="stat-icon"></div>
          <div class="stat-value" id="stat-overdue">—</div>
          <div class="stat-label">Overdue</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 320px;gap:24px;">
        <div class="card">
          <h3 style="font-weight:700;margin-bottom:20px;">Task Breakdown</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
            <div>
              <p class="text-muted" style="font-size:0.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">By Status</p>
              <div id="status-bars"></div>
            </div>
            <div>
              <p class="text-muted" style="font-size:0.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">By Priority</p>
              <div id="priority-bars"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <h3 style="font-weight:700;margin-bottom:20px;">Recent Activity</h3>
          <div class="activity-list" id="activity-list">
            <p class="text-muted" style="font-size:0.85rem;">Loading...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="../js/app.js"></script>
  <script>
    requireAuth();
    renderSidebar('dashboard');
    loadDashboard();

    async function loadDashboard() {
      const res = await authFetch('/users/dashboard');
      if (!res.ok) return;
      const { stats, recentActivity, byStatus, byPriority } = res.data;

      document.getElementById('stat-total').textContent = stats.total;
      document.getElementById('stat-completed').textContent = stats.completed;
      document.getElementById('stat-pending').textContent = stats.pending;
      document.getElementById('stat-overdue').textContent = stats.overdue;

      const statusColors = { todo: 'var(--accent)', in_progress: 'var(--warning)', completed: 'var(--success)' };
      const statusEl = document.getElementById('status-bars');
      byStatus.forEach(s => {
        const pct = stats.total > 0 ? Math.round((s.count / stats.total) * 100) : 0;
        statusEl.innerHTML += `
          <div style="margin-bottom:12px;">
            <div class="flex-between" style="margin-bottom:4px;">
              <span style="font-size:0.8rem;text-transform:capitalize;">${s.status.replace('_', ' ')}</span>
              <span style="font-size:0.78rem;font-family:var(--font-mono);color:var(--text-muted)">${s.count}</span>
            </div>
            <div style="background:var(--bg3);border-radius:4px;height:6px;">
              <div style="width:${pct}%;height:100%;border-radius:4px;background:${statusColors[s.status]||'var(--accent)'}"></div>
            </div>
          </div>`;
      });

      const prioColors = { high: 'var(--danger)', medium: 'var(--warning)', low: 'var(--success)' };
      const prioEl = document.getElementById('priority-bars');
      byPriority.forEach(p => {
        const pct = stats.total > 0 ? Math.round((p.count / stats.total) * 100) : 0;
        prioEl.innerHTML += `
          <div style="margin-bottom:12px;">
            <div class="flex-between" style="margin-bottom:4px;">
              <span style="font-size:0.8rem;text-transform:capitalize;">${p.priority}</span>
              <span style="font-size:0.78rem;font-family:var(--font-mono);color:var(--text-muted)">${p.count}</span>
            </div>
            <div style="background:var(--bg3);border-radius:4px;height:6px;">
              <div style="width:${pct}%;height:100%;border-radius:4px;background:${prioColors[p.priority]||'var(--accent)'}"></div>
            </div>
          </div>`;
      });

      const actEl = document.getElementById('activity-list');
      if (!recentActivity.length) {
        actEl.innerHTML = '<p class="text-muted" style="font-size:0.85rem;">No activity yet.</p>';
        return;
      }
      actEl.innerHTML = recentActivity.map(a => `
        <div class="activity-item">
          <div class="activity-dot"></div>
          <div>
            <div class="activity-text"><strong>${a.user_name || 'User'}</strong> ${a.action}</div>
            <div class="activity-time">${new Date(a.created_at).toLocaleString()}</div>
          </div>
        </div>`).join('');
    }
  </script>
</body>
</html>
